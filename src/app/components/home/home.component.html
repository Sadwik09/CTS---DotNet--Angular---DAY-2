<section class="hero-card">
  <p class="eyebrow">Digital Nurture 5.0</p>
  <h1>{{ portalName }}</h1>
  <p class="summary">
    Browse active courses, test bindings, and watch lifecycle hooks fire as you navigate.
  </p>

  <div class="stats-row">
    <div class="stat-tile">
      <span>Courses loaded</span>
      <strong>{{ availableCoursesCount }}</strong>
    </div>
    <div class="stat-tile">
      <span>Portal status</span>
      <strong>{{ isPortalActive ? 'Active' : 'Inactive' }}</strong>
    </div>
  </div>

  <div class="control-panel">
    <button type="button" [disabled]="!isPortalActive" (click)="onEnrollClick()">Enroll Now</button>
    <p class="message" *ngIf="message">{{ message }}</p>
  </div>

  <label class="search-box" for="searchTerm">Search courses</label>
  <input id="searchTerm" type="text" [(ngModel)]="searchTerm" placeholder="Type a course name" />
  <!-- [property] sends a value from component to DOM once; [(ngModel)] keeps the DOM input and component state in sync both ways. -->
  <p class="live-value">Searching for: {{ searchTerm }}</p>

  <a routerLink="/courses" class="course-link">Open course list</a>
</section>
